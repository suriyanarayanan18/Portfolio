<script>
const ROLES = [
  { id: "recruiter", label: "Recruiter", icon: "🎯", hint: "Business impact, skills match, ATS keywords" },
  { id: "data_scientist", label: "Data Scientist", icon: "🔬", hint: "Methodology, algorithms, technical tradeoffs" },
  { id: "hiring_manager", label: "Hiring Manager", icon: "📋", hint: "Problem-solving, ownership, initiative" },
  { id: "pm", label: "Product Manager", icon: "🧭", hint: "User impact, product thinking, decision enablement" }
];

const PROJECTS = [
  { id: "airline", title: "Airline Delay Analysis", tags: ["Tableau","Analytics","Dashboard Story"], blurb: "Delay causes, airline performance, and seasonality insights." },
  { id: "instacart", title: "Instacart Analysis", tags: ["Tableau","Customer Insights","Viz"], blurb: "Shopping patterns and reorder behavior for growth teams." },
  { id: "moviematch", title: "MovieMatch - AI Recommender", tags: ["Python","Streamlit","ML"], blurb: "Collaborative filtering recommendation engine." },
  { id: "f1", title: "F1 Data Intelligence Report", tags: ["API","Codex","Sports Analytics"], blurb: "Race performance, telemetry, and strategic insights." },
  { id: "underarmour", title: "Under Armour - Strategy", tags: ["Strategy","Analytics Vision"], blurb: "Data-driven transformation roadmap." },
  { id: "erm", title: "ERM - Dairy Manufacturing", tags: ["Risk Mgmt","Operations"], blurb: "Enterprise risk framework and governance." },
  { id: "petalpost", title: "Petal Post - Plant Delivery", tags: ["SQL","Database Design"], blurb: "E-commerce database system." },
  { id: "royaltease", title: "RoyaltEase - DRM System", tags: ["Systems Design","Data Flows"], blurb: "Digital rights and royalty management." },
  { id: "energy", title: "Energy Consumption Prediction", tags: ["ML","Regression"], blurb: "Predictive models for household energy." },
  { id: "streaming", title: "Netflix vs Prime - EDA", tags: ["Python","Pandas","EDA"], blurb: "Cross-platform user behavior comparison." },
  { id: "mindreading", title: "The Mind-Reading Illusion", tags: ["Responsible AI","Privacy"], blurb: "How micro-signals shape recommendations." }
];

let activeRole = null;
let activeProject = null;
const cache = {};

const roleRow = document.getElementById("roleRow");
const pgrid = document.getElementById("pgrid");
const resultEl = document.getElementById("result");
const hintEl = document.getElementById("hint");
const bodyEl = document.getElementById("rBody");
const fuEl = document.getElementById("followup");
const fuInput = document.getElementById("fuInput");
const fuBtn = document.getElementById("fuBtn");
const fuAnswers = document.getElementById("fuAnswers");
const rMeta = document.getElementById("rMeta");
const rPersp = document.getElementById("rPersp");
const modelTag = document.getElementById("rModel");

if (modelTag) modelTag.style.display = "none";

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function setLoading(el, label) {
  el.innerHTML = `
    <div class="spin-wrap">
      <div class="spin"></div>
      <span>${escapeHtml(label)}</span>
    </div>
  `;
}

function setError(el, message, details = "") {
  el.innerHTML = `
    <div class="err">${escapeHtml(message)}</div>
    ${details ? `<pre style="white-space:pre-wrap;color:#a3a3a3;margin-top:8px;font-size:12px;">${escapeHtml(details)}</pre>` : ""}
  `;
}

async function postGenerate(payload) {
  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const raw = await res.text();

  let data;
  try {
    data = JSON.parse(raw);
  } catch {
    return {
      ok: false,
      error: "Backend returned non-JSON.",
      details: raw
    };
  }

  if (!res.ok) {
    return {
      ok: false,
      error: data.error || "Request failed.",
      details: data.details || ""
    };
  }

  return {
    ok: true,
    text: String(data.text || "").trim()
  };
}

ROLES.forEach((role) => {
  const btn = document.createElement("button");
  btn.className = "role-btn";
  btn.type = "button";
  btn.innerHTML = `<span>${role.icon}</span>${role.label}`;
  btn.addEventListener("click", () => pickRole(role, btn));
  roleRow.appendChild(btn);
});

PROJECTS.forEach((project) => {
  const btn = document.createElement("button");
  btn.className = "pcard";
  btn.type = "button";
  btn.dataset.id = project.id;

  const name = document.createElement("div");
  name.className = "name";
  name.textContent = project.title;

  const tags = document.createElement("div");
  tags.className = "tags";
  project.tags.forEach((tagText) => {
    const tag = document.createElement("span");
    tag.className = "tag";
    tag.textContent = tagText;
    tags.appendChild(tag);
  });

  const blurb = document.createElement("div");
  blurb.className = "blurb";
  blurb.textContent = project.blurb;

  btn.appendChild(name);
  btn.appendChild(tags);
  btn.appendChild(blurb);
  btn.addEventListener("click", () => pickProject(project, btn));
  pgrid.appendChild(btn);
});

function pickRole(role, btn) {
  roleRow.querySelectorAll(".role-btn").forEach((b) => b.classList.remove("on"));
  btn.classList.add("on");
  activeRole = role.id;
  document.getElementById("roleHint").textContent = role.hint;

  if (activeProject) {
    generate();
  } else {
    hintEl.textContent = "Now click a project.";
    hintEl.style.display = "block";
  }
}

function pickProject(project, btn) {
  pgrid.querySelectorAll(".pcard").forEach((b) => b.classList.remove("on"));
  btn.classList.add("on");
  activeProject = project.id;
  fuAnswers.innerHTML = "";

  if (activeRole) {
    generate();
  } else {
    hintEl.textContent = "Now pick your role above.";
    hintEl.style.display = "block";
  }
}

async function generate() {
  const key = `${activeProject}_${activeRole}`;
  const project = PROJECTS.find((p) => p.id === activeProject);
  const role = ROLES.find((r) => r.id === activeRole);

  hintEl.style.display = "none";
  resultEl.classList.add("show");
  fuEl.classList.remove("show");

  rMeta.textContent = project.title;
  rPersp.textContent = `Perspective: ${role.label}`;

  if (cache[key]) {
    bodyEl.textContent = cache[key];
    fuEl.classList.add("show");
    resultEl.scrollIntoView({ behavior: "smooth", block: "center" });
    return;
  }

  setLoading(bodyEl, "Generating...");

  try {
    const result = await postGenerate({
      projectId: activeProject,
      role: activeRole
    });

    if (!result.ok) {
      setError(bodyEl, result.error, result.details);
      return;
    }

    cache[key] = result.text || "No response.";
    bodyEl.textContent = cache[key];
    fuEl.classList.add("show");
    resultEl.scrollIntoView({ behavior: "smooth", block: "center" });
  } catch (error) {
    setError(bodyEl, "Request could not reach /api/generate.", String(error?.message || error));
  }
}

fuBtn.addEventListener("click", sendFollowup);
fuInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendFollowup();
});

async function sendFollowup() {
  const q = fuInput.value.trim();
  if (!q || !activeProject || !activeRole) return;

  fuBtn.disabled = true;
  fuInput.value = "";

  const block = document.createElement("div");
  block.className = "fu-answer";

  const qEl = document.createElement("div");
  qEl.className = "fu-q";
  qEl.textContent = `"${q}"`;

  const aEl = document.createElement("div");
  aEl.className = "fu-a";
  setLoading(aEl, "Thinking...");

  block.appendChild(qEl);
  block.appendChild(aEl);
  fuAnswers.appendChild(block);

  try {
    const result = await postGenerate({
      projectId: activeProject,
      role: activeRole,
      followupQuestion: q
    });

    if (!result.ok) {
      aEl.textContent = result.details
        ? `${result.error}\n\n${result.details}`
        : result.error;
    } else {
      aEl.textContent = result.text || "No response.";
    }
  } catch (error) {
    aEl.textContent = `Request could not reach /api/generate.\n\n${String(error?.message || error)}`;
  }

  fuBtn.disabled = false;
  block.scrollIntoView({ behavior: "smooth", block: "center" });
}
</script>
